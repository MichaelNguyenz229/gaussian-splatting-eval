<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scan Evaluation Hub</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; }
        #loading-label {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 8px 12px; border-radius: 4px; display: none;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
    }
    </script>
</head>
<body>
    <div id="loading-label">Loading Model...</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // --- 1. CONFIGURATION ---
        const modelFiles = {
            'OctoTest': 'glb-files/OctoTest_textured_mesh_medpoly_glb.glb',
            '2019 Prius XLE': 'glb-files/Prius_XLE_textured_mesh_medpoly_glb.glb'
        };

        const state = { current: 'OctoTest' };
        let currentSceneModel = null;
        const loadingLabel = document.getElementById('loading-label');

        // --- 2. CORE SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 3. LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- 4. MODEL LOADING LOGIC ---
        const loader = new GLTFLoader();

        function loadSelectedModel(name) {
            const path = modelFiles[name];
            loadingLabel.style.display = 'block';
            loadingLabel.innerText = `Loading ${name}...`;

            // Remove previous model if it exists
            if (currentSceneModel) scene.remove(currentSceneModel);

            loader.load(path, (gltf) => {
                currentSceneModel = gltf.scene;

                // CENTER & SCALE LOGIC
                // This ensures every scan, regardless of size, fits in the view
                const box = new THREE.Box3().setFromObject(currentSceneModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                currentSceneModel.position.sub(center); // Center it at 0,0,0
                
                scene.add(currentSceneModel);
                loadingLabel.style.display = 'none';
                
                // Adjust camera distance based on model size
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(0, maxDim * 0.8, maxDim * 1.5);
                controls.target.set(0, 0, 0);
                controls.update();

            }, undefined, (error) => {
                console.error(error);
                loadingLabel.innerText = "Error loading model.";
            });
        }

        // --- 5. UI CONTROLS ---
        const gui = new GUI({ title: 'Model Selection' });
        gui.add(state, 'current', Object.keys(modelFiles))
           .name('Select Scan')
           .onChange(value => loadSelectedModel(value));

        // --- 6. ANIMATION & RESIZE ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial Load
        loadSelectedModel(state.current);

    </script>
</body>
</html>
